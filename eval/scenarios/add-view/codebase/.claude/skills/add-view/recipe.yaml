name: add-view
description: Add a new API view function to an existing views.py

variables:
  view_name:
    type: string
    required: true
    description: "Name of the view function"
  model_name:
    type: string
    required: true
    description: "Name of the model to query"

files:
  - template: templates/view.py.j2
    inject: "views.py"
    append: true
    skip_if: "def {{ view_name }}"
