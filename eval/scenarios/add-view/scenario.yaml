name: add-view
description: Add a summary view function to an existing views.py using the add-view recipe
tier: easy
category: brownfield-extension

context: |
  You are working on a Django REST framework application.

prompts:
  directed: |
    Use the add-view skill to add a new view function.
    view_name: entity_summary
    model_name: Entity
  natural: |
    Add a GET view called entity_summary that takes a pk and returns summary
    details for an Entity.
  ambient: |
    Here's the updated API spec from the product team:

    ## Entities API

    ### Existing endpoints
    - GET /api/entities/ — List all entities
    - GET /api/entities/:id/ — Entity detail

    ### New endpoints needed
    - GET /api/entities/:id/summary/ — Summary details for an entity.
      Takes a pk parameter and returns summary data for the given Entity.

    Please implement the new endpoint.

expected_files_modified:
  - views.py

assertions:
  - file: views.py
    contains: "def entity_summary"
    weight: 1.0
  - file: views.py
    contains: "@api_view"
    scope: "def entity_summary"
    weight: 0.5
  - file: views.py
    contains: "Entity.objects.get"
    scope: "def entity_summary"
    weight: 0.5

negative_assertions:
  - any_file: true
    not_contains: "SyntaxError"
    description: "Output must be syntactically valid Python"

tags: [easy, brownfield-extension, inject]
estimated_jig_commands: 1
max_jig_commands: 2
