name: add-field-v9-template-first
description: "Variant v9 (template-first): Add a classification field to Entity and propagate to admin, serializer, and factory"
tier: medium
category: brownfield-extension

context: |
  You are working on a Django application with models, admin, factories, and serializers.

prompts:
  directed: |
    Use the add-field skill templates as reference material and apply the change.
    Apply edits directly in code.
    model_name: Entity
    field_name: classification
    field_type: CharField
    field_args: max_length=20, default="standard"
    factory_default: "standard"
    target_model_line: classification = models.CharField(max_length=20, default="standard")
    target_admin_line: "classification",
    target_serializer_line: "classification",
    target_factory_line: classification = "standard"
  natural: |
    Add a classification field (CharField, max_length=20, default="standard") to the Entity model.
    Propagate the field to admin.py (list_display), serializers.py (fields), and factories.py.
  ambient: |
    ## Data model review notes — 2026-04-03

    We need a classification field on Entity so the summary endpoint can
    show tier-specific pricing. CharField, max_length=20, default "standard".
    Make sure it shows up in admin list_display, serializer fields, and the
    factory for tests.

    Please add this.

expected_files_modified:
  - models.py
  - admin.py
  - serializers.py
  - factories.py

assertions:
  - file: models.py
    contains: "classification"
    scope: "class Entity"
    weight: 2.0
  - file: admin.py
    contains: "classification"
    weight: 1.0
  - file: serializers.py
    contains: "classification"
    weight: 1.0
  - file: factories.py
    contains: "classification"
    weight: 1.0

negative_assertions:
  - any_file: true
    not_contains: "SyntaxError"
    description: "Output must be syntactically valid Python"

tags: [medium, brownfield-extension, multi-file, patch, variant-v9-template-first]
