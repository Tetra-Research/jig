name: add-endpoint
description: Add a GET /api/entities/:id/summary endpoint with view, URL, schema, and test
tier: medium
category: brownfield-extension

context: |
  You are working on a Django REST framework application.

prompts:
  directed: |
    Use the add-endpoint skill to add a new endpoint.
    view_name: entity_summary
    url_path: entities/<int:pk>/summary/
    url_name: entity-summary
    schema_name: SummarySchema
    model_name: Entity
  natural: |
    Add a GET /api/entities/<id>/summary endpoint that returns summary details.
    The view should be named entity_summary, the URL should be at
    entities/<int:pk>/summary/, and there should be a test for it.
  ambient: |
    ## Feature request: summary endpoint for entities

    **Acceptance criteria:**
    - GET /api/entities/:id/summary returns summary data for an entity
    - View function: entity_summary
    - URL: entities/<int:pk>/summary/
    - Response schema class with id, display_name, total, currency fields
    - Unit test covering the happy path

    Please implement this change.

expected_files_modified:
  - views.py
  - urls.py
  - schemas.py
  - tests/test_views.py

assertions:
  - file: views.py
    contains: "def entity_summary"
    weight: 1.0
  - file: urls.py
    contains: "summary"
    weight: 1.0
  - file: schemas.py
    contains: "SummarySchema"
    weight: 0.8
  - file: tests/test_views.py
    contains: "def test_entity_summary"
    weight: 0.8

negative_assertions:
  - any_file: true
    not_contains: "SyntaxError"
    description: "Output must be syntactically valid Python"

tags: [medium, brownfield-extension, multi-file, inject]
estimated_jig_commands: 1
max_jig_commands: 4
