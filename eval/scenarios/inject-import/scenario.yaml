name: inject-import
description: Add the missing DateTimeField import to models.py using the inject-import recipe
tier: easy
category: brownfield-extension

context: |
  You are working on a Django-style Python project.

prompts:
  directed: |
    Use the inject-import skill to add a missing import.
    file: models.py
    import_line: from django.db.models import DateTimeField
  natural: |
    The models.py file is missing an import for DateTimeField from django.db.models.
    Add it.
  ambient: |
    I'm getting this error when I run the tests:

    ```
    Traceback (most recent call last):
      File "models.py", line 14, in <module>
        class Reservation(models.Model):
      File "models.py", line 18, in Reservation
        created_at = DateTimeField(auto_now_add=True)
    NameError: name 'DateTimeField' is not defined
    ```

    Can you fix this?

expected_files_modified:
  - models.py

assertions:
  - file: models.py
    contains: "from django.db.models import DateTimeField"
    weight: 1.0
  - file: models.py
    contains: "class Reservation"
    weight: 0.5

negative_assertions:
  - file: models.py
    not_contains: "from django.db.models import DateTimeField\nfrom django.db.models import DateTimeField"
    description: "No duplicate imports"

tags: [easy, brownfield-extension, inject]
estimated_jig_commands: 1
max_jig_commands: 2
