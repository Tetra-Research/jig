name: inject-import
description: Add an import statement to a Python file

variables:
  file:
    type: string
    required: true
    description: "Target file to inject the import into"
  import_line:
    type: string
    required: true
    description: "The full import line to add (e.g., 'from django.db.models import DateTimeField')"

files:
  - template: templates/import.j2
    inject: "{{ file }}"
    after: "^from django"
    at: last
    skip_if: "{{ import_line }}"
