name: add-field
description: Add a field to a Django model

variables:
  model_name:
    type: string
    required: true
    description: "Name of the model class"
  field_name:
    type: string
    required: true
    description: "Name of the new field"
  field_type:
    type: string
    required: true
    description: "Django field type (e.g., CharField)"
  field_args:
    type: string
    required: false
    default: ""
    description: "Field arguments"

files:
  - template: templates/field.j2
    patch: "models.py"
    anchor:
      pattern: "^class {{ model_name }}\\(models\\.Model\\)"
      scope: class_body
      position: after_last_field
    skip_if: "{{ field_name }}"
