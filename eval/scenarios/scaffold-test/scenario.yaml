name: scaffold-test
description: Create a test file for the CoreService using the create-test recipe
tier: easy
category: greenfield

context: |
  You are working on a Django-style Python project.

prompts:
  directed: |
    Use the create-test skill to scaffold a test file.
    service_name: CoreService
    module_path: services.core_service
  natural: |
    Create a test file for the CoreService located at services/core_service.py.
  ambient: |
    CI is failing on this PR:

    ```
    FAIL: coverage check
    services/core_service.py — 0% coverage (no test file found)
    Required: 80%
    ```

    The CoreService at services/core_service.py needs test coverage.
    Please add tests for it.

expected_files_modified:
  - tests/test_core_service.py

assertions:
  - file: tests/test_core_service.py
    contains: "class TestCoreService"
    weight: 1.0
  - file: tests/test_core_service.py
    contains: "def test_"
    weight: 0.8
  - file: tests/test_core_service.py
    contains: "import"
    weight: 0.5

negative_assertions:
  - any_file: true
    not_contains: "SyntaxError"
    description: "Output must be syntactically valid Python"

tags: [easy, greenfield, create]
estimated_jig_commands: 1
max_jig_commands: 2
