name: scaffold-test
description: Create a test file for the BookingService using the create-test recipe
tier: easy
category: greenfield

context: |
  You are working on a Django-style Python project.

prompts:
  directed: |
    Use the create-test skill to scaffold a test file.
    service_name: BookingService
    module_path: services.booking
  natural: |
    Create a test file for the BookingService located at services/booking.py.
  ambient: |
    CI is failing on this PR:

    ```
    FAIL: coverage check
    services/booking.py — 0% coverage (no test file found)
    Required: 80%
    ```

    The BookingService at services/booking.py needs test coverage.
    Please add tests for it.

expected_files_modified:
  - tests/test_booking_service.py

assertions:
  - file: tests/test_booking_service.py
    contains: "class TestBookingService"
    weight: 1.0
  - file: tests/test_booking_service.py
    contains: "def test_"
    weight: 0.8
  - file: tests/test_booking_service.py
    contains: "import"
    weight: 0.5

negative_assertions:
  - any_file: true
    not_contains: "SyntaxError"
    description: "Output must be syntactically valid Python"

tags: [easy, greenfield, create]
estimated_jig_commands: 1
max_jig_commands: 2
