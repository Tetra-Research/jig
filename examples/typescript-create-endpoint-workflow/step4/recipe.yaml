name: create-endpoint-route
description: Register the new endpoint on the router

variables:
  route_path:
    type: string
    required: true
  handler_name:
    type: string
    required: true

files:
  - template: templates/route_registration.ts.j2
    inject: src/routes/index.ts
    after: '^export const api = Router\(\);$'
    skip_if: 'api.post("{{ route_path }}", {{ handler_name }})'
