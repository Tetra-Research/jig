name: typescript-update-model
description: Add a new field to an existing TypeScript Zod schema

variables:
  target_file:
    type: string
    required: true
  schema_symbol:
    type: string
    required: true
  field_name:
    type: string
    required: true
  field_schema:
    type: string
    required: true

files:
  - template: templates/schema_field.ts.j2
    patch: "{{ target_file }}"
    anchor:
      pattern: "^export const {{ schema_symbol | regex_escape }} = z\\.object\\("
      scope: braces
      position: before_close
    skip_if: "{{ field_name }}:"
