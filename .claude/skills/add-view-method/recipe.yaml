name: add-view-method
description: Render an HTTP method + optional body dataclass for injection into an existing view

variables:
  gatekeeper_class:
    type: string
    required: true

  http_method:
    type: enum
    values: [get, post, patch, put, delete]
    required: true

  response_type:
    type: enum
    values: [DataResponse, SimpleResponse]
    default: DataResponse

  status_code:
    type: string
    default: "OK"

  response_data_type:
    type: string
    required: true

  readonly:
    type: boolean
    default: true

  has_path_params:
    type: boolean
    default: true

  has_body:
    type: boolean
    default: false

  body_class:
    type: string
    default: ""

  body_fields:
    type: array
    default: []

  method_body:
    type: string
    required: true

files:
  - template: templates/method.py.j2
    to: "_rendered/method.py"

  - template: templates/body_dataclass.py.j2
    to: "_rendered/body_dataclass.py"
