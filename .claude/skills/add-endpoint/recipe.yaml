name: add-endpoint
description: Create a new Django view file using the request_framework pattern

variables:
  app:
    type: string
    required: true
    description: "Django app name (e.g., guest, tips, hotels)"

  view_name:
    type: string
    required: true
    description: "View class name without 'View' suffix (e.g., ReservationNotes)"

  http_method:
    type: enum
    values: [get, post, patch, put, delete]
    required: true
    description: "HTTP method for the endpoint"

  gatekeeper_class:
    type: string
    required: true
    description: "Gatekeeper class name (e.g., GuestAppGatekeeper)"

  user_type:
    type: enum
    values: [HOTEL_USER, UNAUTHENTICATED_GUEST]
    required: true

  response_type:
    type: enum
    values: [DataResponse, SimpleResponse]
    default: DataResponse

  status_code:
    type: string
    default: "OK"
    description: "HTTPStatus member name (OK, CREATED, NO_CONTENT, etc.)"

  response_data_type:
    type: string
    required: true
    description: "Return type annotation (e.g., list[ReservationNoteSchemaDC])"

  readonly:
    type: boolean
    default: true
    description: "Whether to use readonly_database decorator"

  has_path_params:
    type: boolean
    default: true

  path_params:
    type: array
    default: []
    description: "Array of {name, type} objects for path parameters beyond hotel_slug"

  has_query_params:
    type: boolean
    default: false

  query_params:
    type: array
    default: []

  has_body:
    type: boolean
    default: false

  body_fields:
    type: array
    default: []
    description: "Array of {name, type} objects for request body fields"

  permissions:
    type: array
    default: []
    description: "List of Permission constants (e.g., Permission.CHECK_IN_HAS_PRODUCT_ACCESS)"

  extra_imports:
    type: array
    default: []
    description: "Additional import lines needed by the view"

  method_body:
    type: string
    required: true
    description: "The actual view method body (business logic)"

  url_path:
    type: string
    required: true
    description: "URL path segment after /api/hotels/<hotel_slug>/ (e.g., reservations/<uuid:reservation_uuid>/notes)"

  url_name:
    type: string
    required: true
    description: "Django URL name (e.g., reservation_notes_view)"

  view_file:
    type: string
    required: true
    description: "Output filename relative to app (e.g., views/reservation_notes_view.py)"

files:
  - template: templates/view.py.j2
    to: "{{ app }}/{{ view_file }}"
    skip_if_exists: true

  - template: templates/url_pattern.j2
    to: "url_pattern_{{ view_name | snakecase }}.txt"
